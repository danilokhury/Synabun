<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Interface — Access</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#050505;color:rgba(255,255,255,0.82);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}

/* ── Background layers ─────────────────── */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:40px 40px;
}
.bg-glow{
  position:fixed;z-index:0;
  width:600px;height:600px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(110,181,255,0.05) 0%,rgba(140,160,255,0.025) 40%,transparent 70%);
  pointer-events:none;
  animation:pulse-glow 8s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
}

/* ── Floating particles ────────────────── */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;
  width:2px;height:2px;
  background:rgba(110,181,255,0.3);
  border-radius:50%;
  animation:float-up linear infinite;
}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ── Card ──────────────────────────────── */
.card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  padding:44px 36px 36px;
  background:rgba(18,18,22,0.75);
  backdrop-filter:blur(60px) saturate(1.3);-webkit-backdrop-filter:blur(60px) saturate(1.3);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  box-shadow:
    0 32px 100px rgba(0,0,0,0.65),
    0 0 0 0.5px rgba(255,255,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.04);
  text-align:center;
  animation:card-in 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(20px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Accent line at top */
.card::before{
  content:'';position:absolute;
  top:-1px;left:32px;right:32px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(110,181,255,0.4),rgba(140,160,255,0.3),transparent);
  border-radius:1px;
}

/* ── Logo ──────────────────────────────── */
.logo{
  width:200px;height:auto;
  margin:0 auto 24px;
  opacity:0.85;
  filter:drop-shadow(0 0 20px rgba(110,181,255,0.15));
  animation:logo-in 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
.logo img{width:100%;height:auto}
@keyframes logo-in{
  from{opacity:0;transform:scale(0.8)}
  to{opacity:0.85;transform:scale(1)}
}

/* ── Typography ────────────────────────── */
h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:20px;font-weight:600;
  color:rgba(255,255,255,0.88);
  margin-bottom:6px;
  letter-spacing:-0.02em;
  animation:fade-in 0.6s ease 0.15s both;
}
.subtitle{
  font-size:13px;
  color:rgba(255,255,255,0.32);
  margin-bottom:30px;
  letter-spacing:0.01em;
  animation:fade-in 0.6s ease 0.2s both;
}
@keyframes fade-in{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Input ─────────────────────────────── */
.input-wrap{
  position:relative;margin-bottom:14px;
  animation:fade-in 0.6s ease 0.25s both;
}
.input-wrap input{
  width:100%;padding:13px 16px 13px 40px;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;color:rgba(255,255,255,0.9);
  outline:none;
  transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
}
.input-wrap input:focus{
  border-color:rgba(110,181,255,0.3);
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 0 3px rgba(110,181,255,0.06);
}
.input-wrap input::placeholder{color:rgba(255,255,255,0.18)}
.input-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;
  color:rgba(255,255,255,0.2);
  pointer-events:none;
  transition:color 0.2s;
}
.input-wrap input:focus ~ .input-icon{color:rgba(110,181,255,0.5)}

/* ── Button ────────────────────────────── */
.connect-btn{
  width:100%;padding:12px 0;
  font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
  letter-spacing:0.02em;
  background:linear-gradient(135deg,rgba(110,181,255,0.12),rgba(140,160,255,0.12));
  border:1px solid rgba(110,181,255,0.15);
  border-radius:12px;color:#6eb5ff;
  cursor:pointer;
  transition:all 0.2s ease;
  animation:fade-in 0.6s ease 0.3s both;
}
.connect-btn:hover{
  background:linear-gradient(135deg,rgba(110,181,255,0.2),rgba(140,160,255,0.18));
  border-color:rgba(110,181,255,0.25);
  box-shadow:0 4px 20px rgba(110,181,255,0.1);
  transform:translateY(-1px);
}
.connect-btn:active{transform:translateY(0) scale(0.98)}
.connect-btn:disabled{
  opacity:0.35;cursor:default;
  transform:none !important;
  box-shadow:none !important;
}

/* ── Status ────────────────────────────── */
.status{
  margin-top:16px;font-size:12px;min-height:18px;
  letter-spacing:0.01em;
  transition:color 0.2s,opacity 0.2s;
}
.status:empty{opacity:0}
.status.error{color:#ff6b6b}
.status.success{color:#6eb5ff}
.status.loading{color:rgba(255,255,255,0.4)}

/* ── Divider ───────────────────────────── */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:24px 0 20px;
  animation:fade-in 0.6s ease 0.4s both;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:rgba(255,255,255,0.06);
}
.divider span{
  font-size:11px;
  color:rgba(255,255,255,0.2);
  letter-spacing:0.05em;
  text-transform:uppercase;
  font-weight:500;
  white-space:nowrap;
}

/* ── Social badges ─────────────────────── */
.socials{
  display:flex;justify-content:center;gap:10px;
  animation:fade-in 0.6s ease 0.45s both;
}
.social-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;
  color:rgba(255,255,255,0.4);
  font-size:11.5px;font-weight:500;
  text-decoration:none;
  transition:all 0.2s ease;
  letter-spacing:0.01em;
}
.social-badge svg{
  width:14px;height:14px;
  flex-shrink:0;
  transition:color 0.2s;
}
.social-badge:hover{
  background:rgba(255,255,255,0.06);
  border-color:rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.7);
}
.social-badge.discord:hover{color:#5865F2;border-color:rgba(88,101,242,0.25)}
.social-badge.twitter:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.15)}
.social-badge.github:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.15)}

/* ── Footer ────────────────────────────── */
.footer{
  position:relative;z-index:1;
  margin-top:24px;
  animation:fade-in 0.6s ease 0.5s both;
}
.footer span{
  font-size:11px;
  color:rgba(255,255,255,0.12);
  letter-spacing:0.02em;
}
</style>

<script>
// ── Floating particles ──────────────────
(function() {
  const container = document.getElementById('particles');
  const count = 20;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    p.style.opacity = 0.15 + Math.random() * 0.35;
    container.appendChild(p);
  }
})();

// ── Auth form ───────────────────────────
(function() {
  const form = document.getElementById('auth-form');
  const input = document.getElementById('invite-key');
  const btn = document.getElementById('connect-btn');
  const status = document.getElementById('status');

  // Pre-fill from URL fragment if present (e.g. /invite#mykey)
  if (location.hash.length > 1) {
    input.value = decodeURIComponent(location.hash.slice(1));
    history.replaceState(null, '', location.pathname);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const key = input.value.trim();
    if (!key) { input.focus(); return; }

    btn.disabled = true;
    status.className = 'status loading';
    status.textContent = 'Authenticating\u2026';

    try {
      const res = await fetch('/invite/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key }),
      });
      const data = await res.json();
      if (data.ok) {
        status.className = 'status success';
        status.textContent = 'Authenticated \u2014 redirecting\u2026';
        setTimeout(() => { window.location = '/'; }, 600);
      } else {
        status.className = 'status error';
        status.textContent = data.error || 'Invalid invite key';
        btn.disabled = false;
        input.select();
      }
    } catch (err) {
      status.className = 'status error';
      status.textContent = 'Connection failed';
      btn.disabled = false;
    }
  });
})();
</script>
