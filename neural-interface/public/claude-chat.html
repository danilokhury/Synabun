<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynaBun Chat</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="/claude-chat.css">
</head>
<body class="chat-body">
  <div id="chat-app">

    <!-- Header -->
    <header id="chat-header">
      <div id="header-left">
        <a href="/" id="chat-back" title="Back to Neural Interface">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <span id="chat-title">SynaBun Chat</span>
      </div>
      <div id="header-center">
        <span id="chat-project-label"></span>
      </div>
      <div id="header-right">
        <span id="chat-model-label">claude</span>
        <span id="chat-cost-label" class="chat-cost">$0.0000</span>
        <button id="chat-new-btn" title="New session">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Message list -->
    <div id="messages"></div>

    <!-- Input area -->
    <div id="chat-input-wrap">
      <div id="chat-cwd-row">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span id="chat-cwd-display">~</span>
        <button id="chat-cwd-btn" title="Change directory">change</button>
      </div>
      <div id="chat-input-row">
        <textarea id="chat-input" placeholder="Ask Claude... (Shift+Enter for newline)" rows="1" autocomplete="off" spellcheck="false"></textarea>
        <button id="chat-send-btn" disabled>
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>

  <script type="module" src="/claude-chat.js"></script>
</body>
</html>
