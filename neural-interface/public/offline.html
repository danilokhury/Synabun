<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynaBun - Offline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #030305;
    color: rgba(255,255,255,0.7);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    background: transparent;
    border: none;
    padding: 48px 40px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    position: relative;
  }

  /* --- Mascot --- */
  .mascot-wrap {
    display: inline-block;
    position: relative;
    animation: breathe 4s ease-in-out infinite;
    margin-bottom: 28px;
  }

  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* --- Floating Z's --- */
  .zzz {
    position: absolute;
    top: -4px;
    right: -18px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    font-weight: 700;
    color: rgba(110,200,255,0.45);
    pointer-events: none;
  }

  .zzz span {
    position: absolute;
    bottom: 0;
    right: 0;
    opacity: 0;
    animation: floatZ 3s ease-out infinite;
  }

  .zzz span:nth-child(1) { font-size: 14px; animation-delay: 0s; }
  .zzz span:nth-child(2) { font-size: 18px; animation-delay: 1s; }
  .zzz span:nth-child(3) { font-size: 22px; animation-delay: 2s; }

  @keyframes floatZ {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.7); }
    12%  { opacity: 0.7; }
    100% { opacity: 0; transform: translate(28px, -55px) scale(1.3); }
  }

  /* --- Text --- */
  .heading {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .subtext {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 28px;
  }

  /* --- Start button --- */
  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(110,200,255,0.1);
    border: 1px solid rgba(110,200,255,0.2);
    border-radius: 10px;
    color: rgba(110,200,255,0.8);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 24px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    margin-bottom: 12px;
  }

  .start-btn:hover {
    background: rgba(110,200,255,0.18);
    border-color: rgba(110,200,255,0.35);
    color: rgba(110,200,255,1);
  }

  .start-btn:active {
    transform: scale(0.97);
  }

  .start-btn svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .start-hint {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    margin-bottom: 20px;
  }

  /* --- Command block (fallback) --- */
  .cmd-section {
    margin-bottom: 24px;
  }

  .cmd-label {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cmd-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .cmd-text {
    flex: 1;
    text-align: left;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    font-size: 11.5px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    word-break: break-all;
    user-select: all;
  }

  .cmd-text span {
    color: rgba(110,200,255,0.6);
  }

  .cmd-or {
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    text-align: center;
    margin-bottom: 8px;
  }

  .copy-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: rgba(255,255,255,0.35);
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    border-color: rgba(255,255,255,0.12);
  }

  .copy-btn.copied {
    background: rgba(110,200,255,0.12);
    color: rgba(110,200,255,0.8);
    border-color: rgba(110,200,255,0.2);
  }

  /* --- Retry indicator --- */
  .retry {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }

  .retry-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(110,200,255,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .retry.connected .retry-dot {
    background: rgba(80,220,120,0.7);
    animation: none;
  }

  .retry.connected {
    color: rgba(80,220,120,0.6);
  }

  /* --- Ambient particles --- */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }

  .particles span {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: rgba(130,145,195,0.15);
    animation: drift linear infinite;
  }

  @keyframes drift {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Ambient particles -->
<div class="particles" id="particles"></div>

<div class="card">
  <!-- Sleeping mascot -->
  <div class="mascot-wrap">
    <svg viewBox="0 0 280 140" width="180" height="90" style="overflow:visible">
      <!-- Left eye — closed -->
      <rect x="80" y="57" width="38" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>
      <!-- Right eye — closed -->
      <rect x="162" y="57" width="38" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>
      <!-- Peaceful smile -->
      <path d="M118,90 Q140,100 162,90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="zzz">
      <span>z</span>
      <span>z</span>
      <span>z</span>
    </div>
  </div>

  <div class="heading">Server is sleeping</div>
  <div class="subtext">The Neural Interface server isn't running.</div>

  <!-- Start Server button — downloads a platform-specific startup script -->
  <button class="start-btn" id="startBtn">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Start Server
  </button>
  <div class="start-hint" id="startHint"></div>

  <!-- Manual commands (fallback) -->
  <div class="cmd-section">
    <div class="cmd-label">or run manually</div>
    <div class="cmd-block">
      <div class="cmd-text" id="cmdText"><span>synabun</span></div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="cmd-or" id="cmdOr" style="display:none">or</div>
    <div class="cmd-block" id="cmdFallback" style="display:none">
      <div class="cmd-text" id="cmdFallbackText"></div>
      <button class="copy-btn" id="copyFallbackBtn">Copy</button>
    </div>
  </div>

  <div class="retry" id="retry">
    <div class="retry-dot"></div>
    <span id="retryText">Checking for server...</span>
  </div>
</div>

<script>
  // --- Platform detection ---
  const ua = navigator.userAgent;
  const isWin = /Win/.test(navigator.platform) || /Windows/.test(ua);
  const isMac = /Mac/.test(navigator.platform);
  // Linux = everything else

  const projectDir = localStorage.getItem('synabun-project-dir');

  // --- Start Server button — generates and triggers a startup script download ---
  const startBtn = document.getElementById('startBtn');
  const startHint = document.getElementById('startHint');

  if (isWin) {
    startHint.textContent = 'Downloads start-synabun.bat — double-click to run';
  } else if (isMac) {
    startHint.textContent = 'Downloads start-synabun.command — double-click to run';
  } else {
    startHint.textContent = 'Downloads start-synabun.sh — run with: sh ~/Downloads/start-synabun.sh';
  }

  startBtn.addEventListener('click', () => {
    let script, filename;

    if (isWin) {
      const dir = projectDir || '%APPDATA%\\synabun';
      script = `@echo off\r\ncd /d "${dir}"\r\nnpm start\r\n`;
      filename = 'start-synabun.bat';
    } else if (isMac) {
      const dir = projectDir || '$HOME/.synabun';
      script = `#!/bin/sh\ncd "${dir}"\nnpm start\n`;
      filename = 'start-synabun.command';
    } else {
      const dir = projectDir || '$HOME/.synabun';
      script = `#!/bin/sh\ncd "${dir}"\nnpm start\n`;
      filename = 'start-synabun.sh';
    }

    const blob = new Blob([script], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    startBtn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Downloaded!';
    setTimeout(() => {
      startBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start Server';
    }, 2000);
  });

  // --- Manual command fallback ---
  if (projectDir) {
    const sep = isWin ? ' & ' : ' ; ';
    const fallbackCmd = `cd "${projectDir}"${sep}npm start`;
    const cmdOr = document.getElementById('cmdOr');
    const cmdFallback = document.getElementById('cmdFallback');
    const cmdFallbackText = document.getElementById('cmdFallbackText');
    cmdOr.style.display = '';
    cmdFallback.style.display = '';
    cmdFallbackText.innerHTML = `<span>cd</span> "${projectDir}"${sep}<span>npm</span> start`;
    document.getElementById('copyFallbackBtn').addEventListener('click', function() { copyToClipboard(fallbackCmd, this); });
  }

  // --- Copy helper ---
  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  }

  document.getElementById('copyBtn').addEventListener('click', function() { copyToClipboard('synabun', this); });

  // --- Auto-retry ---
  const retry = document.getElementById('retry');
  const retryText = document.getElementById('retryText');

  const interval = setInterval(async () => {
    try {
      const res = await fetch('/', { method: 'HEAD', cache: 'no-store' });
      if (res.ok) {
        clearInterval(interval);
        retry.classList.add('connected');
        retryText.textContent = 'Server is back! Reconnecting...';
        setTimeout(() => location.reload(), 600);
      }
    } catch {}
  }, 3000);

  // --- Ambient particles ---
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('span');
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (12 + Math.random() * 18) + 's';
    p.style.animationDelay = -(Math.random() * 20) + 's';
    p.style.width = p.style.height = (1.5 + Math.random() * 1.5) + 'px';
    container.appendChild(p);
  }
</script>
</body>
</html>
