<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynaBun - Offline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #030305;
    color: rgba(255,255,255,0.7);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    background: rgba(28,28,30,0.85);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 48px 40px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    position: relative;
  }

  /* --- Mascot --- */
  .mascot-wrap {
    display: inline-block;
    position: relative;
    animation: breathe 4s ease-in-out infinite;
    margin-bottom: 28px;
  }

  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* --- Floating Z's --- */
  .zzz {
    position: absolute;
    top: -4px;
    right: -18px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    font-weight: 700;
    color: rgba(110,200,255,0.45);
    pointer-events: none;
  }

  .zzz span {
    position: absolute;
    bottom: 0;
    right: 0;
    opacity: 0;
    animation: floatZ 3s ease-out infinite;
  }

  .zzz span:nth-child(1) { font-size: 14px; animation-delay: 0s; }
  .zzz span:nth-child(2) { font-size: 18px; animation-delay: 1s; }
  .zzz span:nth-child(3) { font-size: 22px; animation-delay: 2s; }

  @keyframes floatZ {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.7); }
    12%  { opacity: 0.7; }
    100% { opacity: 0; transform: translate(28px, -55px) scale(1.3); }
  }

  /* --- Text --- */
  .heading {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .subtext {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 28px;
  }

  /* --- Command block --- */
  .cmd-block {
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .cmd-text {
    flex: 1;
    text-align: left;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    font-size: 11.5px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    word-break: break-all;
    user-select: all;
  }

  .cmd-text span {
    color: rgba(110,200,255,0.6);
  }

  .copy-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: rgba(255,255,255,0.5);
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    border-color: rgba(255,255,255,0.15);
  }

  .copy-btn.copied {
    background: rgba(110,200,255,0.12);
    color: rgba(110,200,255,0.8);
    border-color: rgba(110,200,255,0.2);
  }

  /* --- Retry indicator --- */
  .retry {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }

  .retry-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(110,200,255,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .retry.connected .retry-dot {
    background: rgba(80,220,120,0.7);
    animation: none;
  }

  .retry.connected {
    color: rgba(80,220,120,0.6);
  }

  /* --- Ambient particles --- */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }

  .particles span {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: rgba(130,145,195,0.15);
    animation: drift linear infinite;
  }

  @keyframes drift {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Ambient particles -->
<div class="particles" id="particles"></div>

<div class="card">
  <!-- Sleeping mascot -->
  <div class="mascot-wrap">
    <svg viewBox="0 0 280 140" width="180" height="90" style="overflow:visible">
      <!-- Left eye — closed -->
      <rect x="80" y="57" width="38" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>
      <!-- Right eye — closed -->
      <rect x="162" y="57" width="38" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>
      <!-- Peaceful smile -->
      <path d="M118,90 Q140,100 162,90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="zzz">
      <span>z</span>
      <span>z</span>
      <span>z</span>
    </div>
  </div>

  <div class="heading">Server is sleeping</div>
  <div class="subtext">The Neural Interface server isn't running.</div>

  <div class="cmd-block">
    <div class="cmd-text">
      <span>cd</span> J:\Sites\Apps\Synabun\neural-interface <span>&&</span> node server.js
    </div>
    <button class="copy-btn" id="copyBtn">Copy</button>
  </div>

  <div class="retry" id="retry">
    <div class="retry-dot"></div>
    <span id="retryText">Checking for server...</span>
  </div>
</div>

<script>
  // --- Copy command ---
  const cmd = 'cd J:\\Sites\\Apps\\Synabun\\neural-interface && node server.js';
  const copyBtn = document.getElementById('copyBtn');

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(cmd);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = cmd;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');
    }, 1500);
  });

  // --- Auto-retry ---
  const retry = document.getElementById('retry');
  const retryText = document.getElementById('retryText');

  const interval = setInterval(async () => {
    try {
      const res = await fetch('/', { method: 'HEAD', cache: 'no-store' });
      if (res.ok) {
        clearInterval(interval);
        retry.classList.add('connected');
        retryText.textContent = 'Server is back! Reconnecting...';
        setTimeout(() => location.reload(), 600);
      }
    } catch {}
  }, 3000);

  // --- Ambient particles ---
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('span');
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (12 + Math.random() * 18) + 's';
    p.style.animationDelay = -(Math.random() * 20) + 's';
    p.style.width = p.style.height = (1.5 + Math.random() * 1.5) + 'px';
    container.appendChild(p);
  }
</script>
</body>
</html>
